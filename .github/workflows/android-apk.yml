name: Build Android APK and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build Android APK and Web, then Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12266719'
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 cmake;3.22.1'
          accept-android-sdk-licenses: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: |
          npm install

      - name: Expo prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform android

      - name: Apply Gradle compatibility fixes
        working-directory: apps/mobile
        run: |
          # Force Kotlin Gradle plugin version to match Compose compiler
          sed -i "s|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')|classpath(\"org.jetbrains.kotlin:kotlin-gradle-plugin:\${rootProject.ext.kotlinVersion}\")|" android/build.gradle
          # Ensure Kotlin version property is set
          if ! grep -q '^android.kotlinVersion=' android/gradle.properties; then
            echo "" >> android/gradle.properties
            echo "android.kotlinVersion=1.9.25" >> android/gradle.properties
          fi

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew --no-daemon assembleRelease

      - name: Rename APK
        run: |
          mkdir -p apps/mobile/dist-mobile
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk apps/mobile/dist-mobile/unimatch-release.apk

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Build web frontend
        working-directory: apps/web
        run: npm run build

      - name: Package web build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/apps/mobile/dist-mobile"
          cd apps/web/dist
          zip -r "$GITHUB_WORKSPACE/apps/mobile/dist-mobile/unimatch-web-dist.zip" .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v0.1.0"
          gh release delete "$TAG" --yes || true
          gh release create "$TAG" \
            --title "UniMatch v0.1.0" \
            --notes "Android APK 与 Web 构建包" \
            apps/mobile/dist-mobile/unimatch-release.apk \
            apps/mobile/dist-mobile/unimatch-web-dist.zip
